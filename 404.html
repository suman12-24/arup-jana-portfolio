<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arup Jana | Mobile & Full Stack Developer</title>
  <meta name="robots" content="noindex" />
  <script>
    // GitHub Pages SPA redirect: preserve path and redirect to index
    const path = window.location.pathname.replace('/arup-jana-portfolio', '');
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace(
      '/arup-jana-portfolio/' +
      (path && path !== '/' ? '?p=' + encodeURIComponent(path) : '') +
      (search ? (path && path !== '/' ? '&' : '?') + search.slice(1) : '') +
      hash
    );
  </script>
</head>
<body>
  <p style="font-family:sans-serif;color:#e2e8f0;background:#020617;padding:2rem;">
    Redirecting to <a href="/arup-jana-portfolio/" style="color:#06b6d4;">Arup Jana's Portfolio</a>…
  </p>
</body>
</html>
